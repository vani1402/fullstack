<!DOCTYPE html>
<html>
<head>
<title>Full Stack App</title>
</head>

<body>

<h1>Jenkins Full Stack Deployment</h1>

<button onclick="send()">Call Backend</button>

<p id="result"></p>

<script>
function send(){

fetch("http://localhost:5000")

.then(res=>res.text())

.then(data=>{

document.getElementById("result").innerHTML=data;

});

}
</script>

</body>
</html>
